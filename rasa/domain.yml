  - action_change_card_pin
  - action_set_card_limit

  - action_check_loan_balance
  - action_view_loan_repayment
  - action_apply_for_loan
  - action_make_loan_payment
  - action_view_loan_interest_rate
  - action_request_loan_deferment

  - action_view_portfolio
  - action_view_investment_performance
  - action_view_market_rates
  - action_view_dividends
  - action_setup_investment_plan
  - action_buy_stocks
  - action_sell_stocks

  - action_view_fixed_deposits
  - action_open_fixed_deposit
  - action_close_fixed_deposit
  - action_renew_fixed_deposit

  - action_find_branch
  - action_find_atm
  - action_view_exchange_rates
  - action_set_alert

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true