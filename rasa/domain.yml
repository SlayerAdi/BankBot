  - transfer_money
  - view_scheduled_transfers
  - cancel_transfer

  - pay_bill
  - view_bills
  - setup_autopay

  - view_cards
  - view_card_details
  - freeze_card
  - unfreeze_card
  - report_lost_card
  - report_stolen_card
  - activate_card
  - request_new_card
  - change_card_pin
  - set_card_limit
  - cards_menu

  - check_loan_balance
  - view_loan_details
  - view_loan_repayment
  - apply_for_loan
  - make_loan_payment
  - view_loan_interest_rate
  - check_loan_eligibility
  - request_loan_deferment
  - loans_menu

  - view_portfolio
  - view_investment_performance
  - view_market_rates
  - view_dividends
  - setup_investment_plan
  - buy_stocks
